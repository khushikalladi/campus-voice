{% extends 'feedback/base.html' %}

{% block content %}

<h2 class="title">Student Registration</h2>

<div class="form-box">

<form method="POST" onsubmit="return validatePassword()">

{% csrf_token %}

<label>Username</label>
<input type="text" name="username">

<label>Email</label>
<input type="email" name="email">

<label>Password</label>

<div style="position: relative;">
    <input type="password" id="password" name="password" required>

    <span id="togglePassword" style="
        position:absolute;
        right:10px;
        top:8px;
        cursor:pointer;">
        👁️
    </span>
</div>

<div id="password-rules" style="margin-top:10px; font-size:14px;">
    <p id="rule-length">❌ Minimum 8 characters</p>
    <p id="rule-uppercase">❌ At least 1 uppercase letter</p>
    <p id="rule-number">❌ At least 1 number</p>
    <p id="rule-special">❌ At least 1 special character</p>
</div>

<label>Confirm Password</label>

<div style="position: relative;">
    <input type="password" id="confirm_password" required>

    <span id="toggleConfirm" style="
        position:absolute;
        right:10px;
        top:8px;
        cursor:pointer;">
        👁️
    </span>
</div>

<p id="match-msg" style="margin-top:5px; font-size:14px;">
    ❌ Passwords do not match
</p>

<label>Student ID</label>
<input type="text" name="student_id">

<button class="post-btn">Register</button>

</form>

</div>

{% endblock %}

{% block scripts %}
<script>

const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm_password");

const toggle = document.getElementById("togglePassword");
const toggleConfirm = document.getElementById("toggleConfirm");

const matchMsg = document.getElementById("match-msg");

const rules = {
    length: document.getElementById("rule-length"),
    uppercase: document.getElementById("rule-uppercase"),
    number: document.getElementById("rule-number"),
    special: document.getElementById("rule-special")
};

// 👁️ toggle password
toggle.onclick = function () {
    password.type = password.type === "password" ? "text" : "password";
};

// 👁️ toggle confirm
toggleConfirm.onclick = function () {
    confirmPassword.type = confirmPassword.type === "password" ? "text" : "password";
};

// 🔥 live password rules
password.addEventListener("input", function () {

    const value = password.value;

    rules.length.innerHTML =
        value.length >= 8 ? "✅ Minimum 8 characters" : "❌ Minimum 8 characters";

    rules.uppercase.innerHTML =
        /[A-Z]/.test(value) ? "✅ At least 1 uppercase letter" : "❌ At least 1 uppercase letter";

    rules.number.innerHTML =
        /[0-9]/.test(value) ? "✅ At least 1 number" : "❌ At least 1 number";

    rules.special.innerHTML =
        /[!@#$%^&*]/.test(value) ? "✅ At least 1 special character" : "❌ At least 1 special character";

    checkMatch();
});

// 🔥 check match live
confirmPassword.addEventListener("input", checkMatch);

function checkMatch() {
    if (confirmPassword.value === "") {
        matchMsg.innerHTML = "❌ Passwords do not match";
        matchMsg.style.color = "red";
    }
    else if (password.value === confirmPassword.value) {
        matchMsg.innerHTML = "✅ Passwords match";
        matchMsg.style.color = "green";
    } else {
        matchMsg.innerHTML = "❌ Passwords do not match";
        matchMsg.style.color = "red";
    }
}

// 🚫 final validation
function validatePassword() {

    const value = password.value;

    if (
        value.length < 8 ||
        !/[A-Z]/.test(value) ||
        !/[0-9]/.test(value) ||
        !/[!@#$%^&*]/.test(value)
    ) {
        alert("Password does not meet requirements ❌");
        return false;
    }

    if (password.value !== confirmPassword.value) {
        alert("Passwords do not match ❌");
        return false;
    }

    return true;
}

</script>
{% endblock %}
